<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTG Deckbuilder</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230d0f14'/%3E%3Cg transform='translate(16 16)'%3E%3Ccircle cx='0' cy='-7' r='4.4' fill='%23f5e7c6'/%3E%3Ccircle cx='6.7' cy='-2.2' r='4.4' fill='%23bcd9f0'/%3E%3Ccircle cx='4.1' cy='5.7' r='4.4' fill='%23c4b7d6'/%3E%3Ccircle cx='-4.1' cy='5.7' r='4.4' fill='%23f0b9a6'/%3E%3Ccircle cx='-6.7' cy='-2.2' r='4.4' fill='%23bfe3c4'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#0d0f14; --bg2:#141821; --bg3:#1c2230; --line:#272e3d; --line2:#333c50;
    --txt:#e7ebf3; --mut:#9aa6bd; --mut2:#8a93a6;
    --w:#f5e7c6; --u:#bcd9f0; --b:#c4b7d6; --r:#f0b9a6; --g:#bfe3c4; --c:#cdd4de;
    --owned:#43d17a; --buy:#ffb454; --gc:#ff6b8b; --acc:#7c9eff; --acc-d:#41508f; --acc-glow:rgba(124,158,255,.14);
    --shadow:0 6px 22px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#0b0d12,#0d0f14 300px);color:var(--txt);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 22px 80px}
  .muted{color:var(--mut)} .small{font-size:12.5px}
  :focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:6px}
  .backlink{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--mut);
    background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:7px 13px;margin-bottom:14px;min-height:36px}
  .backlink:hover{border-color:var(--acc);color:var(--txt)}

  .hero{position:relative;display:flex;gap:16px;align-items:flex-end;overflow:hidden;background:var(--bg2) 50% 28%/cover no-repeat;
    border:1px solid var(--line);border-radius:14px;padding:0;box-shadow:var(--shadow);min-height:190px}
  .hero::before{content:"";position:absolute;inset:0;background:
    linear-gradient(90deg,rgba(8,10,15,.97),rgba(8,10,15,.82) 40%,rgba(8,10,15,.30) 74%,rgba(8,10,15,.62)),
    linear-gradient(0deg,rgba(8,10,15,.92),rgba(8,10,15,.08) 58%)}
  .hero .herobar{position:absolute;left:0;right:0;bottom:0;height:3px;z-index:2}
  .hero .meta{position:relative;z-index:1;flex:1;min-width:0;padding:18px 4px 18px 22px}
  .hero h1{font-size:30px;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.6)}
  .hero .eyebrow,.hero .theme{text-shadow:0 1px 9px rgba(0,0,0,.7)}
  .hero .theme{max-width:none}
  .hero img.cmd{position:relative;z-index:1;width:76px;border-radius:8px;flex:none;margin:0 18px 16px 0;align-self:flex-end;
    box-shadow:0 10px 28px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.14)}
  .navrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .navbuild{display:flex;align-items:center;gap:6px;flex:none}
  .navbuild .lab{font-size:10px;color:var(--mut2);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
  .navbuild .opt{background:var(--bg3);border:1px solid var(--line2);color:var(--mut);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;min-height:32px}
  .navbuild .opt.on{background:var(--acc);color:#0b0d12;border-color:var(--acc)}
  .hero .meta{flex:1;min-width:0}
  .eyebrow{letter-spacing:.16em;text-transform:uppercase;font-size:10.5px;color:var(--mut2);font-weight:700}
  h1{margin:3px 0 3px;font-size:25px;letter-spacing:-.01em}
  .theme{color:var(--mut);font-size:13.5px;margin-bottom:9px}
  .pips{display:inline-flex;gap:4px;vertical-align:middle;margin-left:7px}
  .pip{width:21px;height:21px;display:inline-block;vertical-align:middle}
  .badges{display:flex;flex-wrap:wrap;gap:7px}
  .chip{background:var(--bg3);border:1px solid var(--line2);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600}
  .chip b{color:#fff} .chip.bracket{background:linear-gradient(90deg,#3a2a5e,#2a3a5e);border-color:#4a5a8e}
  .chip.ed{border-color:var(--acc);color:var(--acc)}

  .builds{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:9px 14px;margin-top:10px}
  .bgroup{display:flex;align-items:center;gap:8px}
  .bgroup .lab{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
  .opt{background:var(--bg3);border:1px solid var(--line2);color:var(--txt);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;min-height:38px}
  .opt.on{background:var(--acc);color:#0b0d12;border-color:var(--acc)}
  .opt.na{opacity:.32;cursor:default}
  .builds .now{margin-left:auto;font-size:12.5px;color:var(--mut)}

  .nav{position:sticky;top:0;z-index:30;background:rgba(13,15,20,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);margin-top:12px;padding:8px 0}
  .tabs{display:flex;gap:4px}
  .tabs button{background:none;border:0;color:var(--mut);font-size:14.5px;font-weight:700;padding:9px 14px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:7px;min-height:40px}
  .tabs button.on{background:var(--bg3);color:#fff}
  .tabs .tc{font-size:11.5px;font-weight:700;color:var(--mut);background:var(--bg);border:1px solid var(--line2);border-radius:999px;padding:1px 7px}
  .tabs button.on .tc{color:var(--acc)}
  .ctl{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin:12px 0 4px}
  .lab{font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .seg{display:inline-flex;background:var(--bg3);border:1px solid var(--line2);border-radius:9px;overflow:hidden}
  .seg button{background:none;border:0;color:var(--mut);padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;min-height:38px}
  .seg button.on{background:var(--acc);color:#0b0d12}
  .btn{background:var(--bg3);border:1px solid var(--line2);color:var(--txt);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;min-height:38px}
  .btn:hover{border-color:var(--acc)} .btn.primary{background:var(--acc);color:#0b0d12;border-color:var(--acc)}
  .btn.on{background:var(--owned);color:#0b0d12;border-color:var(--owned)} .btn.warn{border-color:var(--buy);color:var(--buy)}
  .spacer{flex:1}

  .editbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--line2);border-radius:11px;padding:9px 13px;margin:8px 0}
  .editbar .big{font-size:19px;font-weight:800}
  .editbar.ok .big{color:var(--owned)} .editbar.over .big{color:var(--gc)} .editbar.under .big{color:var(--buy)}
  .editbar .seps{color:var(--mut);font-size:12.5px}
  .editbar .hint{font-size:12px;color:var(--buy);font-weight:600}

  .legend{display:flex;gap:14px;align-items:center;font-size:12px;color:var(--mut);margin:2px 0 10px;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  .dot.owned{background:var(--owned)} .dot.buy{background:var(--buy)}

  .listcols{column-width:340px;column-gap:24px}
  .tgroup{break-inside:avoid;margin:0 0 16px;display:inline-block;width:100%}
  .tgroup h4{font-size:12.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin:0 0 5px;padding-bottom:5px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
  .tgroup h4 .gc2{color:var(--mut)}
  .row{display:flex;align-items:center;gap:7px;padding:3px 6px;border-radius:6px;font-size:13.5px;position:relative}
  .row:hover{background:var(--bg3)}
  .row .q{color:var(--mut);font-variant-numeric:tabular-nums;min-width:14px}
  .row .rn{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
  .row .rp{width:7px;height:7px;border-radius:2px;flex:none;display:inline-block;margin-right:2px}
  .row .gctag{color:var(--gc);font-size:10px;font-weight:800;margin-left:5px}
  .row .pr{font-size:12px;color:var(--buy);font-variant-numeric:tabular-nums}
  .row .rmx{width:22px;height:22px;border-radius:5px;border:1px solid var(--line2);background:var(--bg);color:var(--gc);font-weight:800;cursor:pointer;display:none;line-height:1;font-size:13px}
  .editing .row .rmx{display:inline-block}
  .row .swp{width:22px;height:22px;border-radius:5px;border:1px solid var(--line2);background:var(--bg);color:var(--acc);font-weight:800;cursor:pointer;display:none;line-height:1;font-size:13px}
  .editing .row .swp{display:inline-block}
  .row .stp{display:none;gap:4px;align-items:center}
  .editing .row.basic .stp{display:inline-flex}
  .row .stp button{width:22px;height:22px;border-radius:5px;border:1px solid var(--line2);background:var(--bg);color:var(--txt);font-weight:800;cursor:pointer;line-height:1}
  .mc{display:inline-flex;gap:2px;align-items:center}
  .ms{width:15px;height:15px;display:inline-block;vertical-align:middle}
  .ms.N{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-size:9.5px;font-weight:800;background:#39414f;color:#cdd4de}

  .vcols{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
  .card{display:flex;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px;position:relative}
  .card:hover{border-color:var(--line2)}
  .card .th{width:50px;height:70px;border-radius:5px;flex:none;background:#0a0c10 center/cover;cursor:zoom-in;border:1px solid var(--line)}
  .card .nm{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .card .tl{font-size:11px;color:var(--mut2);margin:1px 0 3px}
  .card .rsn{font-size:12px;color:var(--mut);line-height:1.4}
  .card .foot{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
  .tag{font-size:10px;font-weight:800;letter-spacing:.04em;padding:2px 7px;border-radius:999px;text-transform:uppercase}
  .tag.owned{background:rgba(67,209,122,.15);color:var(--owned)} .tag.buy{background:rgba(255,180,84,.15);color:var(--buy)}
  .tag.gc{background:rgba(255,107,139,.15);color:var(--gc)} .tag.val{background:var(--acc-glow);color:var(--acc)}
  .tag.role{background:var(--bg3);color:var(--mut)}
  .buylink{font-size:10px;font-weight:700;color:var(--acc);border:1px solid var(--line2);border-radius:999px;padding:2px 8px;text-decoration:none}
  .buylink:hover{border-color:var(--acc)}
  .price{font-size:12px;color:var(--mut)} .incl{font-size:11px;color:var(--mut)}
  .vrm{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;border:1px solid var(--line2);background:var(--bg3);color:var(--gc);font-weight:800;cursor:pointer;display:none}
  .vsw{position:absolute;top:6px;right:36px;width:24px;height:24px;border-radius:50%;border:1px solid var(--line2);background:var(--bg3);color:var(--acc);font-weight:800;cursor:pointer;display:none}
  .editing .vrm,.editing .vsw{display:block} .editing .card{padding-right:66px}
  /* Game Changer picker */
  .gcpanel .gccount{font-size:12px;font-weight:800;color:var(--gc);background:rgba(255,107,139,.12);border-radius:999px;padding:2px 9px;margin-left:6px;vertical-align:middle}
  .gcpanel .gccount.full{color:var(--owned);background:rgba(67,209,122,.12)}
  .gccur{display:flex;flex-direction:column;gap:8px}
  .gcalts{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:10px}
  .gcrow{display:flex;gap:11px;align-items:flex-start;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:9px}
  .gcrow.cur{border-color:var(--line2);background:var(--bg3)}
  .gcrow.empty{justify-content:center;align-items:center;border-style:dashed;color:var(--mut);min-height:46px;font-size:12.5px}
  .gcrow.alt:hover{border-color:var(--acc)}
  .gcth{width:46px;height:64px;border-radius:5px;flex:none;background:#0a0c10 center/cover;cursor:zoom-in;border:1px solid var(--line)}
  .gcmeta{flex:1;min-width:0}
  .gcmeta .nm{font-weight:700;font-size:13.5px}
  .gcmeta .tl{font-size:11px;color:var(--mut2)}
  .gcmeta .rsn{font-size:12px;color:var(--mut);line-height:1.4;margin-top:2px}
  .gcmeta .foot{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
  .gc-own{font-size:11px;font-weight:700;color:var(--owned)} .gc-buy{font-size:11px;font-weight:700;color:var(--buy)}
  .gcact{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex:none}
  .gcx{background:none;border:1px solid var(--line2);color:var(--gc);border-radius:7px;width:26px;height:26px;cursor:pointer;font-size:15px;line-height:1}
  .gcx:hover{border-color:var(--gc);background:rgba(255,107,139,.1)}
  .btn.sm{padding:5px 10px;min-height:30px;font-size:12px}
  .gcswap{font-size:12px}
  .gcswap summary{cursor:pointer;color:var(--acc);font-weight:600;list-style:none;white-space:nowrap;padding:4px 0}
  .gcswap summary::-webkit-details-marker{display:none}
  .gcswlist{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-top:5px;justify-content:flex-end}
  .gcswbtn{background:var(--bg3);border:1px solid var(--line2);color:var(--txt);border-radius:7px;padding:4px 8px;font-size:11.5px;cursor:pointer}
  .gcswbtn:hover{border-color:var(--acc);background:var(--acc);color:#0b0d12}
  .prereq-warn{color:var(--buy);font-weight:700}
  /* landing-tab game-plan summary */
  .planbox{background:var(--acc-glow);border:1px solid var(--acc-d);border-radius:12px;padding:13px 15px;margin-bottom:16px}
  .planbox .plan-which{font-size:13px;color:var(--txt);line-height:1.5}
  .planbox .plan-tag{font-weight:800;color:var(--acc);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-right:7px}
  .planbox .plan-h{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut2);font-weight:700;margin:9px 0 3px}
  .planbox .plan-primary{font-size:13px;line-height:1.5;color:var(--txt)}
  .planbox .plan-link{margin-top:10px;background:none;border:none;color:var(--acc);font-weight:700;font-size:12.5px;cursor:pointer;padding:0;display:inline-block}
  .planbox .plan-link:hover{text-decoration:underline}
  /* Compare tab */
  .cmptbl-wrap{overflow-x:auto;margin-bottom:18px}
  .cmptbl{width:100%;border-collapse:collapse;font-size:13px}
  .cmptbl th,.cmptbl td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
  .cmptbl thead th{background:var(--bg2);font-weight:700}
  .cmptbl thead th.bcol,.cmptbl thead th.ck{color:var(--acc)}
  .cmptbl tbody th{color:var(--mut2);font-weight:600;white-space:nowrap;background:var(--bg2)}
  .cmptbl td.ck,.cmptbl th.ck{text-align:center;width:84px}
  .cmptbl .yes{color:var(--owned);font-weight:800}
  .cmptbl .no{color:var(--line2)}
  .cmptbl td.cardcell{white-space:nowrap}
  .cmp-h{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut2);font-weight:700;margin:6px 0 9px}

  h2.sec{font-size:14px;margin:22px 0 11px;display:flex;align-items:center;gap:10px;color:var(--txt)}
  h2.sec .cnt{color:var(--mut);font-weight:600;font-size:12.5px}
  h2.sec::after{content:"";flex:1;height:1px;background:var(--line)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .panel.wide{grid-column:1/-1}
  .pipbar{display:flex;height:22px;border-radius:11px;overflow:hidden;margin:6px 0 16px;background:var(--bg3)}
  .pipseg{height:100%;box-shadow:inset -2px 0 0 rgba(8,10,15,.5)}
  .pipseg:last-child{box-shadow:none}
  .piprows{display:flex;flex-direction:column;gap:11px}
  .piprow{display:grid;grid-template-columns:22px 1fr auto 46px;align-items:center;gap:11px;font-size:14px}
  .piprow .ms{width:20px;height:20px}
  .piprow .pn{color:var(--txt)}
  .piprow b{font-variant-numeric:tabular-nums;text-align:right}
  .piprow .pct{color:var(--mut);font-variant-numeric:tabular-nums;text-align:right}
  .panel{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:15px 17px}
  .panel h3{margin:0 0 11px;font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
  .check{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13.5px;border-bottom:1px dashed var(--line)}
  .check:last-child{border-bottom:0}
  .mark{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none}
  .pass{background:rgba(67,209,122,.16);color:var(--owned)} .warn{background:rgba(255,180,84,.16);color:var(--buy)}
  .note{font-size:12px;color:var(--mut);margin-top:4px;padding-left:28px}
  .cmb{background:var(--bg3);border:1px solid var(--line);border-radius:10px;margin:7px 0;overflow:hidden}
  .cmb>summary{list-style:none;cursor:pointer;padding:9px 12px;display:flex;gap:9px;align-items:baseline;flex-wrap:wrap}
  .cmb>summary::-webkit-details-marker{display:none}
  .cmb>summary::before{content:"\25B8";color:var(--acc);font-size:11px;align-self:center}
  .cmb[open]>summary::before{content:"\25BE"}
  .cmb-pieces{font-weight:700;font-size:13.5px;flex:1;min-width:150px}
  .cmb-res{font-size:11.5px;color:var(--acc)}
  .cmb-body{padding:2px 12px 12px;border-top:1px solid var(--line)}
  .cmb-thumbs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
  .cth{width:46px;height:64px;border-radius:4px;background:#0a0c10 center/cover;border:1px solid var(--line);flex:none;cursor:zoom-in}
  .cth.tmpl{display:flex;align-items:center;justify-content:center;text-align:center;background:var(--bg2);cursor:default;border-style:dashed}
  .cth.tmpl span{font-size:8px;color:var(--mut);padding:2px;line-height:1.15}
  .cmb-sec{margin:9px 0}
  .cmb-h{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut2);font-weight:700;margin-bottom:4px}
  .cardlink{border-bottom:1px dotted var(--mut2);cursor:help;transition:color .12s,border-color .12s}
  .cardlink:hover,.cardlink:focus{color:#fff;border-bottom-color:var(--acc);outline:none}
  .tmplname{color:var(--buy)}
  .cmd{cursor:zoom-in}
  .gsecs{display:flex;flex-direction:column;gap:12px}
  .gp{font-size:13.5px;line-height:1.6;color:var(--mut)}
  .gl{margin:2px 0 0;padding-left:20px;display:flex;flex-direction:column;gap:7px;font-size:13.5px;line-height:1.55;color:var(--mut)}
  .gl li{padding-left:3px}
  .gl li::marker{color:var(--acc)}
  .glab{color:var(--txt);font-weight:700}
  .cmb-sug{margin:5px 0 2px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .sugbtn{font-size:11.5px;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);border-radius:999px;padding:3px 9px;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
  .sugbtn:hover{border-color:var(--acc);background:var(--acc-glow)}
  .sg-own{color:var(--owned);font-size:10.5px}
  .sg-buy{color:var(--buy);font-size:10.5px}
  .sg-ok{color:var(--owned);font-size:11px;font-weight:600}
  .cmb-need{margin:0;padding-left:17px;font-size:12.5px;line-height:1.6}
  .cmb-steps{margin:0;padding-left:18px;font-size:12.5px;line-height:1.5}
  .cmb-steps li{margin-bottom:3px}
  .cmb-prod{display:flex;flex-wrap:wrap;gap:5px}
  .cmb-tag{font-size:11px;background:var(--acc-glow);color:var(--acc);border-radius:999px;padding:2px 9px}
  .cmb-foot{display:flex;align-items:center;gap:12px;margin-top:11px;flex-wrap:wrap}
  .cmb-link{font-size:12px;font-weight:700;color:var(--acc);text-decoration:none;border:1px solid var(--line2);border-radius:8px;padding:5px 10px}
  .cmb-link:hover{border-color:var(--acc)}
  .cmb-pop{font-size:11.5px;color:var(--mut)}
  .cmb-mini{color:var(--acc);text-decoration:none;font-weight:700}
  .curve{display:flex;align-items:flex-end;gap:7px;height:110px;padding-top:6px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
  .bar .fill{display:block;width:100%;background:linear-gradient(180deg,var(--acc),var(--acc-d));border-radius:5px 5px 0 0;min-height:3px}
  .bar .bn{font-size:11.5px;font-weight:700}.bar .bl{font-size:10.5px;color:var(--mut)}
  .rb{display:grid;grid-template-columns:96px 1fr 30px;align-items:center;gap:9px;font-size:12.5px;margin-bottom:6px}
  .rb .track{background:var(--bg3);border-radius:6px;height:10px;overflow:hidden}
  .rb .tf{display:block;height:100%;background:linear-gradient(90deg,var(--acc-d),var(--acc));border-radius:6px}
  .rb .rc{text-align:right;color:var(--mut)}
  .wincons{margin:0;padding:0;list-style:none;display:grid;gap:7px}
  .wincons li{position:relative;padding-left:18px;color:var(--mut);font-size:13px}
  .wincons li::before{content:"\25B8";position:absolute;left:2px;color:var(--acc)}
  .placeholder{background:var(--bg2);border:1px dashed var(--line2);border-radius:14px;padding:40px;text-align:center;color:var(--mut);margin-top:18px}
  .placeholder h3{color:var(--txt);margin:0 0 8px}

  .hl{background:linear-gradient(90deg,var(--acc-glow),transparent);border:1px solid var(--line2);border-radius:11px;padding:11px 14px;margin-bottom:13px;font-size:13px}
  .hl b{color:var(--acc)}
  .intro{color:var(--mut);font-size:13.5px;margin-bottom:6px;line-height:1.55}
  .floatimg{position:fixed;pointer-events:none;z-index:99;width:230px;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none}.overlay.open{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--bg2);border-left:1px solid var(--line2);z-index:41;transform:translateX(100%);transition:transform .2s;display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.5)}
  .drawer.open{transform:translateX(0)}
  .dh{padding:15px 17px;border-bottom:1px solid var(--line);position:relative}
  .dh h3{margin:0 0 9px;font-size:15px}
  .search{width:100%;background:var(--bg3);border:1px solid var(--line2);border-radius:9px;color:var(--txt);padding:9px 11px;font-size:13.5px}
  .dfilters{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .dfilters button{font-size:11px;padding:6px 10px;border-radius:999px;border:1px solid var(--line2);background:var(--bg3);color:var(--mut);cursor:pointer}
  .dfilters button.on{background:var(--acc);color:#0b0d12;border-color:var(--acc)}
  .poollist{overflow:auto;padding:7px 11px;flex:1}
  .poolrow{display:flex;gap:10px;align-items:center;padding:6px;border-radius:8px}.poolrow:hover{background:var(--bg3)}
  .poolrow .pth{width:34px;height:47px;border-radius:4px;background:#0a0c10 center/cover;flex:none;cursor:zoom-in;border:1px solid var(--line)}
  .poolrow .pb{flex:1;min-width:0}.poolrow .pn{font-weight:700;font-size:12.5px}.poolrow .pt{font-size:10.5px;color:var(--mut)}
  .poolrow .add{border:1px solid var(--acc);background:transparent;color:var(--acc);border-radius:7px;padding:6px 11px;font-weight:700;cursor:pointer;font-size:11.5px}
  .poolrow .add:hover{background:var(--acc);color:#0b0d12}
  .dclose{background:none;border:0;color:var(--mut);font-size:21px;cursor:pointer;position:absolute;top:11px;right:14px}
  footer{margin-top:36px;color:var(--mut);font-size:11.5px;text-align:center;border-top:1px solid var(--line);padding-top:16px}
  @media(max-width:680px){.grid2{grid-template-columns:1fr}}
  /* screen-reader-only text for non-colour-only cues / accessible names */
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
  /* respect reduced-motion: no drawer slide / detail animations */
  @media(prefers-reduced-motion:reduce){.drawer{transition:none}*{scroll-behavior:auto}}
</style>

<body>
__MANA_SPRITE__
<div class="wrap" id="app"></div>
<img class="floatimg" id="floatimg" alt="" />
<span class="vh" id="srlive" role="status" aria-live="polite"></span>
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <div class="dh"><button class="dclose" id="dclose" aria-label="Close add-cards panel">&times;</button><h3 id="drawerTitle">Add cards</h3>
    <div class="small muted" id="drawerSub" style="margin:-4px 0 8px"></div>
    <input class="search" id="poolsearch" placeholder="Search the candidate pool..." />
    <div class="dfilters" id="dfilters"></div></div>
  <div class="poollist" id="poollist"></div>
</div>
<script>window.DECK_DATA = __DECK_DATA_PLACEHOLDER__;</script>
<script type="application/json" id="pooldata">__POOL_DATA_PLACEHOLDER__</script>
<script>
(function(){
  "use strict";
  var D=window.DECK_DATA, AUD_RATE=(D.fxAud||1.39), VAR=D.variants;
  // ---- per-deck visual identity: derive the UI accent + hero strip from the commander's COLOUR IDENTITY ----
  // override the --acc CSS vars at runtime so the whole UI (tabs, buttons, focus rings, charts) keys off the deck's colours
  var IDHUE={W:46,U:212,B:280,R:8,G:131,C:222}, IDC={W:'#e9d9a6',U:'#73a9e6',B:'#9d80cf',R:'#e07a5a',G:'#5cc46f',C:'#9aa6bd'};
  (function(){ var ci=(D.commander&&D.commander.color_identity)||[]; if(!ci.length)ci=['C'];
    var x=0,y=0; ci.forEach(function(c){var h=((IDHUE[c]==null?222:IDHUE[c]))*Math.PI/180; x+=Math.cos(h); y+=Math.sin(h);});
    var H=Math.round((Math.atan2(y,x)*180/Math.PI+360)%360);
    var sat=(ci.length===1&&ci[0]==='C')?12:(ci.length===1?58:64);
    var rs=document.documentElement.style;
    rs.setProperty('--acc','hsl('+H+','+sat+'%,71%)');
    rs.setProperty('--acc-d','hsl('+H+','+sat+'%,44%)');
    rs.setProperty('--acc-glow','hsla('+H+','+sat+'%,62%,.15)');
  })();
  function idGradient(){ var ci=(D.commander&&D.commander.color_identity)||[]; if(!ci.length)ci=['C']; var cs=ci.map(function(c){return IDC[c]||IDC.C;}); if(cs.length===1)cs=[cs[0],cs[0]]; return 'linear-gradient(90deg,'+cs.join(',')+')'; }
  // the big candidate pool lives in a separate inert JSON block; parse it lazily on first use (Add-cards drawer)
  // so the page renders the deck instantly. (A hosted backend can serve the same JSON from a URL instead.)
  var _pool=null;
  function getPool(){ if(_pool)return _pool; var el=document.getElementById('pooldata'); try{_pool=JSON.parse(el.textContent);}catch(e){_pool=[];} if(_pool&&!Array.isArray(_pool))_pool=[_pool]; if(!Array.isArray(_pool))_pool=[]; return _pool; }
  // derive the small thumbnail URL from the normal image (pool rows store only the normal image to save space)
  function smallImg(u){ return u?(''+u).replace('/normal/','/small/'):u; }
  function mtg(n){return 'https://www.mtgmate.com.au/cards/search?q='+encodeURIComponent(n);}
  var ROLE={ramp:'Ramp',"card-draw":'Card draw','spot-removal':'Removal','board-wipe':'Board wipe',protection:'Protection',synergy:'Synergy',recursion:'Recursion',land:'Land'};
  var ROLECLR={ramp:'#bfe3c4','card-draw':'#bcd9f0','spot-removal':'#f0b9a6','board-wipe':'#ff6b8b',protection:'#f5e7c6',synergy:'#c4b7d6',recursion:'#cdd4de',land:'#6b7689'};
  var TYPES=['Creatures','Sorceries','Instants','Artifacts','Enchantments','Planeswalkers','Battles','Lands','Other'];
  var BUILDLABEL={owned:'Fully owned',optimal:'Optimal',synergy:'Commander-centric'};
  var BUILDORDER=['owned','optimal','synergy'];
  var GCCAP={1:0,2:0,3:3,4:Infinity,5:Infinity};
  // cEDH "chase" cards never suggested as replacements (matches the engine $chase denylist; D.chase can extend)
  var CHASE={};['savannah','bayou','scrubland','tundra','underground sea','taiga','plateau','volcanic island','tropical island','badlands',"gaea's cradle","serra's sanctum",'ancient tomb','mana vault','grim monolith','chrome mox','mox diamond','mox opal','mox emerald','mox jet','mox pearl','mox ruby','mox sapphire',"lion's eye diamond",'imperial seal',"mishra's workshop",'the tabernacle at pendrell vale','the one ring','cyclonic rift','mana crypt','jeweled lotus'].concat(D.chase||[]).forEach(function(x){CHASE[(''+x).toLowerCase()]=true;});
  function cardType(c){var t=c.type_line||'';if(/Land/.test(t))return 'Lands';if(/Creature/.test(t))return 'Creatures';if(/Planeswalker/.test(t))return 'Planeswalkers';if(/Battle/.test(t))return 'Battles';if(/Instant/.test(t))return 'Instants';if(/Sorcery/.test(t))return 'Sorceries';if(/Artifact/.test(t))return 'Artifacts';if(/Enchantment/.test(t))return 'Enchantments';return 'Other';}

  var keys=Object.keys(VAR);
  var build=(D.defaultVariant&&VAR[D.defaultVariant])?D.defaultVariant:keys[0];
  var tab='deck', view='list', groupBy='type', buyMode='budget', filter='all', editing=false, drawerOpen=false, poolSearch='', poolFilter='all', replaceTarget=null, replaceRole=null, replaceTags=null;
  // localStorage key is stamped with the build rev: a fresh engine build (new D.rev) orphans stale
  // in-browser edits so the deck loads from the pristine baseline instead of silently overriding it.
  var CK='mtgdeck:'+((D.commander&&D.commander.name)||'deck')+':'+(D.rev||'0');
  // tidy: drop this deck's edits saved under OLDER build revs so they don't accumulate across rebuilds
  try{var _pfx='mtgdeck:'+((D.commander&&D.commander.name)||'deck')+':';for(var _i=localStorage.length-1;_i>=0;_i--){var _k=localStorage.key(_i);if(_k&&_k.indexOf(_pfx)===0&&_k.indexOf(CK)!==0)localStorage.removeItem(_k);}}catch(e){}
  function clone(x){return JSON.parse(JSON.stringify(x));}
  function keyOf(){return build;}
  var cards=[];
  function curV(){return VAR[keyOf()];}
  function loadState(){var k=keyOf();var v=VAR[k];if(!v){cards=[];return;}var s=null;try{s=JSON.parse(localStorage.getItem(CK+':'+k));}catch(e){}cards=(s&&Array.isArray(s.cards))?s.cards:clone(v.cards);}
  function persist(){try{localStorage.setItem(CK+':'+keyOf(),JSON.stringify({cards:cards}));}catch(e){}}
  function edited(){var v=VAR[keyOf()];return v&&JSON.stringify(cards)!==JSON.stringify(v.cards);}

  function fmt(v){return v==null?'-':'A$'+((+v)*AUD_RATE).toFixed(2);}
  // a single card's buy price: explicit "n/a" when Scryfall has no price (instead of a bare "-")
  function priceStr(v){return (v==null||isNaN(+v))?'n/a':fmt(v);}
  function esc(s){return (s==null?'':''+s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  // only emit https URLs into href/src/url() sinks; esc + encode quotes so the value can't break out of the attribute or url('...')
  function safeUrl(u){u=''+(u||'');return /^https:\/\//i.test(u)?esc(u).replace(/'/g,'%27'):'';}
  function stateOf(x){return (typeof x==='string'&&x.trim())?x:'';}
  function lc(s){return (s||'').toLowerCase();}
  function inDeck(n){return cards.some(function(c){return lc(c.name)===lc(n);});}
  function isBasic(c){return /Basic Land/.test(c.type_line||'');}
  var MSNAME={W:'White',U:'Blue',B:'Black',R:'Red',G:'Green',C:'Colorless'};
  // real MTG mana glyphs via the inlined sprite (offline-safe); coloured pips = WUBRGC, generic/X/hybrid stay text in a grey disc
  function pipSvg(c){return /^[WUBRGC]$/.test(c)?'<svg class="pip" role="img" aria-label="'+MSNAME[c]+'"><use href="#ms-'+c+'"/></svg>':'';}
  function manaSymbols(mc){if(!mc)return '';var t=mc.match(/\{[^}]+\}/g)||[];return '<span class="mc">'+t.map(function(x){var s=x.replace(/[{}]/g,'');return /^[WUBRGC]$/.test(s)?'<svg class="ms" aria-hidden="true"><use href="#ms-'+s+'"/></svg>':'<span class="ms N">'+esc(s)+'</span>';}).join('')+'</span>';}
  // role is computed once in the engine (Get-Role) and emitted on every deck + pool card, so the JS just consumes it
  function roleOf(c){return c.role||'synergy';}
  function fnTags(t){return (t||[]).filter(function(x){return x!=='body'&&x!=='other'&&x!=='land';});}
  function overlap(a,b){if(!a||!b)return 0;var s={},n=0;b.forEach(function(x){s[x]=1;});a.forEach(function(x){if(s[x]){n++;}});return n;}

  // ---- hover-links: any card NAME mentioned in prose/combos shows the card image on hover/focus ----
  // Built once from the commander + every build's cards (the universe of cards a guide can name).
  var CARDIMG={},CASED={};
  (function(){ function add(n,img){ if(!n)return; var k=lc(n); if(img&&!CARDIMG[k])CARDIMG[k]=img; CASED[k]=n; }
    if(D.commander)add(D.commander.name,D.commander.image);
    Object.keys(VAR).forEach(function(k){var v=VAR[k];(v.cards||[]).forEach(function(c){add(c.name,c.image);});(v.optionalBuys||[]).forEach(function(c){add(c.name,c.image);});}); })();
  function reEsc(s){return (''+s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
  // proper-noun match: case-sensitive, longest-first, skip basics (so the word "Forest" isn't linked)
  var LINKLIST=Object.keys(CASED).map(function(k){return CASED[k];}).filter(function(n){return !/^(Forest|Island|Swamp|Mountain|Plains|Wastes|Snow-Covered)\b/.test(n);}).sort(function(a,b){return b.length-a.length;});
  var LINKRE=LINKLIST.length?new RegExp('('+LINKLIST.map(reEsc).join('|')+')','g'):null;
  function cardSpanByName(name){var img=CARDIMG[lc(name)];return img?'<span class="cardlink" tabindex="0" data-full="'+safeUrl(img)+'">'+esc(name)+'</span>':esc(name);}
  // card names contain none of & < > " so they survive esc() verbatim -> escape first, then wrap matches
  function linkCards(text){ if(text==null)return ''; var e=esc(''+text); if(!LINKRE)return e;
    return e.replace(LINKRE,function(m,p1,off,str){ var b=str.charAt(off-1),a=str.charAt(off+m.length);
      if((b&&/[A-Za-z0-9]/.test(b))||(a&&/[A-Za-z0-9]/.test(a)))return m; return cardSpanByName(m); }); }

  // ---- guide formatting: turn a prose "slab" into readable bullets with bold lead-in labels + card links ----
  function labelize(seg){
    var m=seg.match(/^(TURN \d+(?:-\d+)?:|PATH [A-Z]\b|STEP \d+\b|MULLIGAN:|CRITICAL:|[A-Z][A-Z'’ ]{2,}:)\s*[-–—]?\s*/);
    if(m)return '<b class="glab">'+esc(m[1])+'</b> '+linkCards(seg.slice(m[0].length));
    var e=seg.match(/^\((?:\d{1,2}|[a-e])\)\s*/);
    if(e)return linkCards(seg.slice(e[0].length));
    return linkCards(seg);
  }
  function splitSeg(text){ var t=(''+text).replace(/\s+/g,' ').trim();
    t=t.replace(/e\.g\./g,'eDOTQQgDOTQQ').replace(/i\.e\./g,'iDOTQQeDOTQQ').replace(/\b(etc|vs)\./g,'$1DOTQQ');  // protect abbreviations
    var S=' |||S||| ';
    t=t.replace(/([.])\s+/g,'.'+S);                                                  // sentence breaks
    t=t.replace(/\s+(\(\d{1,2}\)|\([a-e]\)|PATH [A-Z]\b|STEP \d+\b|TURN \d)/g,S+'$1');// enumerations / step markers
    return t.split('|||S|||').map(function(s){return s.replace(/DOTQQ/g,'.').trim();}).filter(Boolean); }
  function fmtGuide(text){ if(text==null||text==='')return '';
    var parts=splitSeg(text);
    if(parts.length<=1)return '<div class="gp">'+labelize(parts[0]||(''+text))+'</div>';
    return '<ul class="gl">'+parts.map(function(p){return '<li>'+labelize(p)+'</li>';}).join('')+'</ul>'; }
  function sharedTags(a,b){if(!a||!b)return [];var s={};b.forEach(function(x){s[x]=1;});return a.filter(function(x){return s[x];});}
  function sumCount(arr){return arr.reduce(function(a,c){return a+(c.count||1);},0);}

  function stats(){
    var v=curV();
    var nonland=cards.filter(function(c){return cardType(c)!=='Lands';});
    var lands=sumCount(cards.filter(function(c){return cardType(c)==='Lands';}));
    var nonCmd=sumCount(cards);
    var ownedCount=sumCount(cards.filter(function(c){return c.status==='owned';}))+((D.commander.status==='owned')?1:0);
    var buys=cards.filter(function(c){return c.status==='buy';});
    var buyCost=buys.reduce(function(a,c){return a+(+c.price_usd||0);},0);
    var gcCards=cards.filter(function(c){return c.is_gc;});
    var nlc=sumCount(nonland);
    var avgMV=nlc?nonland.reduce(function(a,c){return a+(+c.cmc||0)*(c.count||1);},0)/nlc:0;
    var deckValue=cards.reduce(function(a,c){return a+((+c.price_usd||0)*(c.count||1));},0)+(+D.commander.price_usd||0);
    return {v:v,nonland:nonland,lands:lands,nonCmd:nonCmd,total:nonCmd+1,ownedCount:ownedCount,buys:buys,buyCost:buyCost,gcCards:gcCards,avgMV:avgMV,deckValue:deckValue,cap:GCCAP[v.bracket]};
  }

  function listRow(c){
    var role=roleOf(c), nm=esc(c.name);
    var dot='<span class="dot '+c.status+'" aria-hidden="true"></span>';
    var rp='<span class="rp" style="background:'+ROLECLR[role]+'" aria-hidden="true"></span>';
    var pr=c.status==='buy'?'<span class="pr">'+priceStr(c.price_usd)+'</span>':'';
    var gct=c.is_gc?'<span class="gctag">GC</span>':'';
    var ttl=esc((c.reason?c.reason+'  ':'')+'['+(ROLE[role]||'')+']'+(c.inclusion_pct!=null?' '+c.inclusion_pct+'% of decks':''));
    var rm='<button class="rmx" data-rm="'+nm+'" title="Remove" aria-label="Remove '+nm+'">&times;</button>';
    var sw=isBasic(c)?'':'<button class="swp" data-swap="'+nm+'" title="Replace with the next-best card" aria-label="Replace '+nm+'">&#8646;</button>';
    var stp='<span class="stp"><button data-dec="'+nm+'" aria-label="One fewer '+nm+'">&minus;</button><span>'+(c.count||1)+'</span><button data-inc="'+nm+'" aria-label="One more '+nm+'">+</button></span>';
    // aria-label carries the cues the colour dot / role square convey visually (WCAG 1.4.1)
    var al=esc(c.name+', '+(ROLE[role]||'card')+', '+(c.status==='owned'?'owned':'to buy'+(c.price_usd!=null?' '+fmt(c.price_usd):''))+(c.is_gc?', Game Changer':''));
    return '<div class="row '+(isBasic(c)?'basic':'')+'" data-full="'+safeUrl(c.image)+'" tabindex="0" role="group" aria-label="'+al+'" title="'+ttl+'">'+dot+rp+'<span class="q" aria-hidden="true">'+(c.count||1)+'</span><span class="rn">'+nm+gct+'</span>'+manaSymbols(c.mana_cost)+pr+stp+sw+rm+'</div>';
  }
  function cardTile(c){
    var tags=[];tags.push('<span class="tag '+(c.status==='owned'?'owned':'buy')+'">'+(c.status==='owned'?'Owned':'Buy '+priceStr(c.price_usd))+'</span>');
    if(c.is_gc)tags.push('<span class="tag gc">Game Changer</span>');
    tags.push('<span class="tag role">'+(ROLE[roleOf(c)]||'')+'</span>');
    if(c.reason==='Added by you.')tags.push('<span class="tag val">★ added</span>');
    var incl=c.inclusion_pct!=null?'<span class="incl">'+c.inclusion_pct+'%</span>':'';
    var rm=editing?'<button class="vrm" data-rm="'+esc(c.name)+'" title="Remove" aria-label="Remove '+esc(c.name)+'">&times;</button>':'';
    var sw=(editing&&!isBasic(c))?'<button class="vsw" data-swap="'+esc(c.name)+'" title="Replace with the next-best card" aria-label="Replace '+esc(c.name)+'">&#8646;</button>':'';
    return '<div class="card">'+rm+sw+'<div class="th" style="background-image:url(\''+safeUrl(c.image_small||c.image)+'\')" data-full="'+safeUrl(c.image)+'"></div>'+
      '<div><div class="nm">'+((c.count>1&&!isBasic(c))?'<span class="muted">'+c.count+'× </span>':'')+esc(c.name)+' '+manaSymbols(c.mana_cost)+'</div>'+
      '<div class="tl">'+esc(c.type_line)+'</div>'+(c.reason?'<div class="rsn">'+esc(c.reason)+'</div>':'')+'<div class="foot">'+tags.join('')+incl+(c.status==='buy'?'<a class="buylink" href="'+mtg(c.name)+'" target="_blank" rel="noopener noreferrer">mtgmate</a>':'')+'</div></div></div>';
  }
  // one-line "why this build / when to play it" — generic across commanders
  function buildPurpose(b){
    if(b==='owned')return 'Playable right now — 100% from your collection, zero purchases. Sleeve it up as-is.';
    if(b==='synergy')return 'Built so '+esc((D.commander.name||'').split(',')[0])+' is the engine and a wincon — pick this to make the deck revolve around the commander.';
    return 'The strongest Bracket-3 build and the one to aim for — your cards plus the buys worth making.';
  }
  // landing-tab game plan: which build + the primary win line, so you know how the deck wins without digging
  function planSummary(){
    var v=curV(); if(!v)return '';
    var wc=(v.wincons||[]);
    var primary=wc.length?'<div class="plan-h">Primary win</div><div class="plan-primary">'+linkCards(wc[0])+'</div>':'';

  // Map a Commander Spellbook "requires" template to a capability tag our deck/pool cards carry (from Get-Tags).

  // Map Commander Spellbook "requires" template names -> a predicate over a card (using baked capability tags
  // from Get-Tags, plus a couple of field-based checks). Curated for precision; extend as new templates appear.
  // Anything unmatched stays a non-actionable hint (graceful degradation) rather than a wrong suggestion.
  var TEMPLATEMATCH=[

    [/free sacrifice|sacrifice outlet|sac outlet|sacrifice a creature/i, tg('freesac')],
    [/mana dork|taps for mana|mana elf|mana creature|creature.*tap.*mana/i, tg('manadork')],
    [/haste/i, tg('hastegiver')],
    [/untap/i, tg('untapper')],
    [/token.*doubl|doubl.*token|populate/i, tg('tokendoubler')],
    [/counter.*doubl|doubl.*counter/i, tg('counterdoubler')],
    [/proliferate/i, tg('counters')],
    [/blink|flicker/i, tg('flicker')],
    [/aristocrat|blood artist|death (trigger|payoff)|payoff.*dies|drain|loses? life|life loss/i, tg('drain')],
    [/lifegain|gain.*life payoff|whenever you gain life/i, tg('lifegain')],
    [/draw (outlet|payoff|engine|spell|trigger)|way to draw|wheel|card draw/i, tg('draw')],

    [/evasion|unblockable|menace|flying|trample/i, tg('evasion')],

  function comboCard(co){

  function buildStats(k){
    var v=VAR[k], cl=v.cards;
    var nonland=cl.filter(function(c){return cardType(c)!=='Lands';});
    var lands=sumCount(cl.filter(function(c){return cardType(c)==='Lands';}));
    var ownedCount=sumCount(cl.filter(function(c){return c.status==='owned';}))+((D.commander.status==='owned')?1:0);
    var buys=cl.filter(function(c){return c.status==='buy';});
    var buyCost=buys.reduce(function(a,c){return a+(+c.price_usd||0);},0);
    var value=cl.reduce(function(a,c){return a+((+c.price_usd||0)*(c.count||1));},0)+(+D.commander.price_usd||0);
    var gc=cl.filter(function(c){return c.is_gc;});
    var nlc=sumCount(nonland);

    var save=cards; cards=cl; var ready=liveCombos(v).filter(comboReady).length; cards=save;
    return {k:k,total:sumCount(cl)+1,lands:lands,owned:ownedCount,buys:buys.length,buyCost:buyCost,value:value,gc:gc,avgMV:avgMV,ready:ready,wincons:v.wincons||[]};

      rowM('Ready combos',function(s){return ''+s.ready;})+

      '</tbody></table></div>';
    // card-difference matrix: every nonbasic card NOT present in all builds, with a per-build ✓/·
    var seen={},order=[];
    ks.forEach(function(k){VAR[k].cards.forEach(function(c){if(isBasic(c))return;if(!seen[c.name]){seen[c.name]={name:c.name,type:cardType(c),status:c.status,price:c.price_usd,inb:{}};order.push(c.name);}seen[c.name].inb[k]=true;});});
    var diff=order.map(function(n){return seen[n];}).filter(function(o){return ks.some(function(k){return !o.inb[k];});});

    var dhead='<tr><th>Card</th>'+ks.map(function(k){return '<th class="ck">'+esc(shortBuild(k))+'</th>';}).join('')+'<th>Type</th></tr>';
    var drows=diff.map(function(o){return '<tr><td class="cardcell">'+cardSpanByName(o.name)+(o.status==='buy'?' <span class="gc-buy">'+priceStr(o.price)+'</span>':'')+'</td>'+ks.map(function(k){return '<td class="ck">'+(o.inb[k]?'<span class="yes">&check;</span>':'<span class="no">&middot;</span>')+'</td>';}).join('')+'<td class="muted small">'+esc(o.type)+'</td></tr>';}).join('');
    var diffTbl='<div class="cmp-h">What&rsquo;s different &mdash; '+diff.length+' cards vary, '+shared+' shared by all builds</div><div class="cmptbl-wrap"><table class="cmptbl diff"><thead>'+dhead+'</thead><tbody>'+drows+'</tbody></table></div>';
    return '<div class="intro">All '+ks.length+' builds side by side &mdash; key metrics and the exact cards that differ, so you don&rsquo;t have to toggle. (Compares the recommended lists, not your in-browser edits.)</div>'+metrics+diffTbl;
  }

  function fillPool(){
    var q=lc(poolSearch);
    var rep=!!replaceTarget;
    var tgt=rep?cards.filter(function(c){return lc(c.name)===lc(replaceTarget);})[0]:null;
    var gcUsed=cards.filter(function(c){return c.is_gc;}).length;
    var cap=GCCAP[curV().bracket];
    var gcRoom=cap-gcUsed+((tgt&&tgt.is_gc)?1:0);   // GC slots free once the target is removed
    var list=getPool().filter(function(p){
      if(inDeck(p.name)&&!isBasic(p))return false;
      if(rep){
        if(isBasic(p))return false;
        if(CHASE[lc(p.name)])return false;
        if(build==='owned'&&!p.owned)return false;
        if(p.is_gc&&gcRoom<=0)return false;
        var tgtLand=(replaceRole==='land')||((replaceTags||[]).indexOf('land')>=0);
        if(tgtLand){ if(!/Land/.test(p.type_line||''))return false; p._ov=0; p._shared=[]; }
        else{
          var want=fnTags(replaceTags);
          var ov=overlap(fnTags(p.tags),want);
          if(want.length){ if(ov===0 && roleOf(p)!==replaceRole)return false; }
          else { if(roleOf(p)!==replaceRole)return false; }
          p._ov=ov; p._shared=sharedTags(fnTags(p.tags),want);
        }
      }else{
        if(poolFilter==='owned'&&!p.owned)return false;
        if(poolFilter==='land'&&!/Land/.test(p.type_line||''))return false;
        if(poolFilter==='nonland'&&/Land/.test(p.type_line||''))return false;
        if(poolFilter==='gc'&&!p.is_gc)return false;
      }
      if(q&&lc(p.name).indexOf(q)<0&&lc(p.type_line).indexOf(q)<0)return false;
      return true;
    });
    function score(p){return (p.inclusion_pct||0)+30*(p.synergy||0)+(p.owned?5:0);}
    if(rep)list.sort(function(a,b){return ((b._ov||0)-(a._ov||0))||(score(b)-score(a));});
    // basics have sky-high inclusion% but are almost never what you're adding — sink them below real candidates
    else list.sort(function(a,b){return ((isBasic(a)?1:0)-(isBasic(b)?1:0))||((b.inclusion_pct||0)-(a.inclusion_pct||0));});
    var lim=rep?40:90;
    var shown=list.slice(0,lim);
    document.getElementById('poollist').innerHTML=shown.map(function(p){return '<div class="poolrow"><div class="pth" style="background-image:url(\''+safeUrl(smallImg(p.image))+'\')" data-full="'+safeUrl(p.image)+'"></div><div class="pb"><div class="pn">'+esc(p.name)+' '+manaSymbols(p.mana_cost)+'</div><div class="pt">'+esc(p.type_line)+' · '+(p.owned?'<span style="color:var(--owned)">owned</span>':'<span style="color:var(--buy)">'+priceStr(p.price_usd)+'</span>')+(p.inclusion_pct!=null?' · '+p.inclusion_pct+'%':'')+(p.is_gc?' · <span style="color:var(--gc)">GC</span>':'')+((rep&&p._shared&&p._shared.length)?' · <span style="color:var(--acc)">'+esc(p._shared.join(', '))+'</span>':'')+'</div></div><button class="add" data-add="'+esc(p.name)+'">'+(rep?'Use':'+ Add')+'</button></div>';}).join('')+(list.length>lim?'<div class="muted small" style="padding:10px;text-align:center">'+(list.length-lim)+' more — refine search...</div>':'')+(!list.length?'<div class="muted small" style="padding:20px;text-align:center">'+(rep?'No legal same-role options left.':'No matches.')+'</div>':'');
    bindPoolImgs();
  }

  function swapCard(name){if(!replaceTarget)return;
    // confirm the replacement is actually addable BEFORE removing the target, or we silently shrink the deck to 99
    var p=null;getPool().forEach(function(x){if(lc(x.name)===lc(name))p=x;});
    if(!p){alert('Couldn\'t find "'+name+'" in the candidate pool, so nothing was swapped.');return;}
    if(inDeck(name)&&!isBasic(p)){alert('"'+name+'" is already in the deck, so nothing was swapped.');return;}
    var tgt=replaceTarget;replaceTarget=null;replaceRole=null;cards=cards.filter(function(c){return lc(c.name)!==lc(tgt);});lastFocus=null;closeDrawer();addCard(name);var oa=document.getElementById('openAdd');if(oa)oa.focus();}

  function addCard(name){var ex=null;cards.forEach(function(c){if(lc(c.name)===lc(name))ex=c;});if(ex){if(isBasic(ex)){ex.count=(ex.count||1)+1;persist();render();if(drawerOpen){fillPool();var ps=document.getElementById('poolsearch');if(ps)ps.focus();}}return;}var p=null;getPool().forEach(function(x){if(lc(x.name)===lc(name))p=x;});if(!p)return;cards.push({name:p.name,role:p.role||'synergy',tags:p.tags||[],status:p.owned?'owned':'buy',reason:'Added by you.',count:1,cmc:+p.cmc||0,type_line:p.type_line,mana_cost:p.mana_cost,oracle_text:p.oracle_text,color_identity:p.color_identity||[],price_usd:p.price_usd,image:p.image,image_small:smallImg(p.image),inclusion_pct:p.inclusion_pct,synergy:p.synergy,is_gc:!!p.is_gc,legal:'legal'});persist();render();if(drawerOpen){fillPool();var ps=document.getElementById('poolsearch');if(ps)ps.focus();}}
  function removeCard(name){cards=cards.filter(function(c){return lc(c.name)!==lc(name);});persist();render();if(drawerOpen){fillPool();var ps=document.getElementById('poolsearch');if(ps)ps.focus();}}
  // Game Changer 1-for-1 swap: drop one current GC and add the chosen one (keeps the deck at 100 + the GC count constant).
  function gcSwap(outName,inName){cards=cards.filter(function(c){return lc(c.name)!==lc(outName);});addCard(inName);}
  function step(name,d){var c=null;cards.forEach(function(x){if(lc(x.name)===lc(name))c=x;});if(!c)return;c.count=(c.count||1)+d;if(c.count<=0){removeCard(name);return;}persist();render();}

  function copy(t,btn){navigator.clipboard.writeText(t).then(function(){var o=btn.textContent;btn.textContent='Copied ✓';setTimeout(function(){btn.textContent=o;},1400);});}
  function fi(){return document.getElementById('floatimg');}
  function bindImgs(sel){Array.prototype.forEach.call(document.querySelectorAll(sel),function(el){function show(e){var f=el.dataset.full;if(!f)return;var im=fi();im.src=f;im.style.display='block';var x0=(e.clientX||innerWidth/2),y0=(e.clientY||120);var x=x0+18,y=y0-110;if(x+236>innerWidth)x=x0-250;if(y<8)y=8;if(y+330>innerHeight)y=innerHeight-338;im.style.left=x+'px';im.style.top=y+'px';}el.onmousemove=show;el.onmouseleave=function(){fi().style.display='none';};el.onfocus=show;el.onblur=function(){fi().style.display='none';};});}
  function bindPoolImgs(){bindImgs('#poollist .pth[data-full]');Array.prototype.forEach.call(document.querySelectorAll('#poollist .add'),function(b){b.onclick=function(){if(replaceTarget)swapCard(b.dataset.add);else addCard(b.dataset.add);};});}
  function switchKey(){loadState();editing=false;if(!curV())tab='deck';render();}
  function wire(){
    function each(sel,fn){Array.prototype.forEach.call(document.querySelectorAll(sel),fn);}
    each('[data-bd]',function(b){b.onclick=function(){build=b.dataset.bd;switchKey();};});
    each('[data-jump]',function(b){b.onclick=function(){build=b.dataset.jump;switchKey();};});
    each('[data-tab]',function(b){b.onclick=function(){tab=b.dataset.tab;window.scrollTo(0,0);render();};});
    each('[data-g]',function(b){b.onclick=function(){groupBy=b.dataset.g;render();};});
    each('[data-v]',function(b){b.onclick=function(){view=b.dataset.v;render();};});
    each('[data-f]',function(b){b.onclick=function(){filter=b.dataset.f;render();};});
    each('[data-buy]',function(b){b.onclick=function(){buyMode=b.dataset.buy;render();};});
    each('[data-rm]',function(b){b.onclick=function(){removeCard(b.dataset.rm);};});
    each('[data-addsug]',function(b){b.onclick=function(){addCard(b.dataset.addsug);};});
    each('[data-gcadd]',function(b){b.onclick=function(){addCard(b.dataset.gcadd);};});
    each('[data-gcin]',function(b){b.onclick=function(){gcSwap(b.dataset.gcout,b.dataset.gcin);};});
    each('[data-swap]',function(b){b.onclick=function(e){e.stopPropagation();openReplace(b.dataset.swap);};});
    each('[data-dec]',function(b){b.onclick=function(){step(b.dataset.dec,-1);};});
    each('[data-inc]',function(b){b.onclick=function(){step(b.dataset.inc,1);};});
    var et=document.getElementById('editToggle');if(et)et.onclick=function(){editing=!editing;render();};
    // non-blocking two-step reset (no native confirm())
    var rb=document.getElementById('resetBtn');if(rb)rb.onclick=function(){
      var sr=document.getElementById('srlive');
      if(rb.getAttribute('data-armed')){try{localStorage.removeItem(CK+':'+keyOf());}catch(e){}if(sr)sr.textContent='Deck reset to the original recommendation.';loadState();render();return;}
      rb.setAttribute('data-armed','1');rb.textContent='Click again to reset';rb.setAttribute('aria-label','Confirm reset to the original recommendation');if(sr)sr.textContent='Reset armed — click again to confirm.';
      setTimeout(function(){if(rb&&rb.getAttribute('data-armed')){rb.removeAttribute('data-armed');rb.textContent='Reset';if(sr)sr.textContent='Reset cancelled.';}},2500);
    };
    var oa=document.getElementById('openAdd');if(oa)oa.onclick=openDrawer;
    var cm=document.getElementById('copyMox');if(cm)cm.onclick=function(){copy(moxText(),cm);};
    each('.seg button,.opt',function(b){b.setAttribute('aria-pressed',b.classList.contains('on')?'true':'false');});
    // tablist: roving-tabindex arrow-key navigation (role/aria-selected/tabindex are set in the markup)
    var tl=document.querySelector('.tabs');
    if(tl){tl.onkeydown=function(e){var ks=['ArrowLeft','ArrowRight','Home','End'];if(ks.indexOf(e.key)<0)return;e.preventDefault();
      var btns=Array.prototype.slice.call(tl.querySelectorAll('[role=tab]'));var i=btns.indexOf(document.activeElement);if(i<0)i=0;var n=btns.length,j=i;
      if(e.key==='ArrowLeft')j=(i-1+n)%n;else if(e.key==='ArrowRight')j=(i+1)%n;else if(e.key==='Home')j=0;else j=n-1;
      var nt=btns[j].getAttribute('data-tab');tab=nt;render();var f=document.getElementById('tab-'+nt);if(f)f.focus();};}
    bindImgs('.row[data-full]');bindImgs('.th[data-full]');bindImgs('.cth[data-full]');bindImgs('.cardlink[data-full]');bindImgs('.cmd[data-full]');bindImgs('.gcth[data-full]');
  }
  var dfil=[['all','All'],['owned','Owned'],['land','Lands'],['nonland','Nonland'],['gc','Game Changers']];
  document.getElementById('dfilters').innerHTML=dfil.map(function(f){return '<button data-pf="'+f[0]+'" class="'+(poolFilter===f[0]?'on':'')+'">'+f[1]+'</button>';}).join('');
  Array.prototype.forEach.call(document.querySelectorAll('[data-pf]'),function(b){b.setAttribute('aria-pressed',b.classList.contains('on')?'true':'false');b.onclick=function(){poolFilter=b.dataset.pf;Array.prototype.forEach.call(document.querySelectorAll('[data-pf]'),function(x){var on=x.dataset.pf===poolFilter;x.classList.toggle('on',on);x.setAttribute('aria-pressed',on?'true':'false');});fillPool();};});
  document.getElementById('poolsearch').oninput=function(e){poolSearch=e.target.value;fillPool();};
  document.getElementById('dclose').onclick=closeDrawer;document.getElementById('overlay').onclick=closeDrawer;
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&drawerOpen)closeDrawer();});
  // focus trap: keep Tab/Shift+Tab inside the drawer while it's open
  document.getElementById('drawer').addEventListener('keydown',function(e){
    if(e.key!=='Tab'||!drawerOpen)return;
    var f=Array.prototype.filter.call(this.querySelectorAll('button,input,select,textarea,a[href],[tabindex]:not([tabindex="-1"])'),function(el){return el.offsetParent!==null&&!el.disabled;});
    if(!f.length)return;var first=f[0],last=f[f.length-1];
    if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
    else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
  });
  if(D.commander&&D.commander.name){try{document.title=D.commander.name+' — Commander Deck';}catch(e){}}
  loadState();render();
})();
</script>
